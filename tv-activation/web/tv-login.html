<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — LUKI PLAY</title>
  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #001E41;
      --navy2:     #071428;
      --navy3:     #0D2040;
      --cyan:      #00D4EA;
      --cyan-glow: rgba(0, 212, 234, 0.18);
      --white:     #FFFFFF;
      --gray:      #C5D0DC;
      --gray2:     #7A8FA6;
      --focus-clr: #FFD700;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy);
      color: var(--white);
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fondo con gradiente sutil ───────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 50%, rgba(0,212,234,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 85% 20%, rgba(0,50,100,0.4) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout principal: dos columnas ─────────────────────── */
    .screen {
      position: relative;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
    }

    /* ── Columna izquierda: QR + instrucciones ───────────────── */
    .col-qr {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5vh 6vw 5vh 8vw;
      gap: 3vh;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      align-self: flex-start;
      margin-bottom: 1vh;
    }
    .logo-circle {
      width: 52px; height: 52px;
      background: var(--cyan);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-circle svg { width: 26px; height: 26px; fill: var(--navy); }
    .logo-name {
      font-size: 26px; font-weight: 800; letter-spacing: 1px;
    }
    .logo-name span { color: var(--cyan); }

    .qr-box {
      position: relative;
      background: #fff;
      border-radius: 20px;
      padding: 14px;
      box-shadow: 0 0 0 4px var(--cyan-glow), 0 20px 60px rgba(0,0,0,0.5);
      transition: box-shadow 0.5s;
    }
    .qr-box.pulsing {
      animation: qrPulse 2.5s ease-in-out infinite;
    }
    @keyframes qrPulse {
      0%, 100% { box-shadow: 0 0 0 4px var(--cyan-glow), 0 20px 60px rgba(0,0,0,0.5); }
      50%       { box-shadow: 0 0 0 10px rgba(0,212,234,0.25), 0 20px 60px rgba(0,0,0,0.5); }
    }
    .qr-img {
      width: 200px; height: 200px;
      display: block;
      border-radius: 8px;
    }
    .qr-corner {
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--cyan);
      border-style: solid;
      border-width: 0;
    }
    .qr-corner.tl { top: 4px; left: 4px;   border-top-width: 3px; border-left-width: 3px; border-radius: 6px 0 0 0; }
    .qr-corner.tr { top: 4px; right: 4px;  border-top-width: 3px; border-right-width: 3px; border-radius: 0 6px 0 0; }
    .qr-corner.bl { bottom: 4px; left: 4px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 6px; }
    .qr-corner.br { bottom: 4px; right: 4px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 6px 0; }

    .scan-label {
      font-size: 17px;
      color: var(--gray);
      text-align: center;
      line-height: 1.5;
    }
    .scan-label strong { color: var(--white); }

    /* ── Divisor vertical ────────────────────────────────────── */
    .divider {
      position: absolute;
      left: 50%;
      top: 15%;
      height: 70%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(0,212,234,0.25) 30%, rgba(0,212,234,0.25) 70%, transparent);
    }
    .divider-label {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: var(--navy2);
      border: 1px solid rgba(0,212,234,0.2);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      color: var(--gray2);
      font-weight: 700;
    }

    /* ── Columna derecha: código + estado ───────────────────── */
    .col-code {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5vh 8vw 5vh 6vw;
      gap: 2.5vh;
    }

    .step-label {
      font-size: 15px;
      color: var(--cyan);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .instructions {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.4;
    }

    .url-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,212,234,0.1);
      border: 1px solid rgba(0,212,234,0.3);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 18px;
      font-weight: 600;
      color: var(--cyan);
      width: fit-content;
    }
    .url-chip svg { width: 16px; height: 16px; fill: var(--cyan); flex-shrink: 0; }

    /* ── Código grande ───────────────────────────────────────── */
    .code-container {
      background: var(--navy3);
      border: 2px solid rgba(0,212,234,0.3);
      border-radius: 16px;
      padding: 20px 28px;
    }
    .code-container-label {
      font-size: 13px;
      color: var(--gray2);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .code-value {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 10px;
      color: var(--cyan);
      font-family: 'SF Mono', 'Courier New', monospace;
      line-height: 1;
    }
    .code-value.loading {
      opacity: 0.3;
      letter-spacing: 6px;
      font-size: 36px;
    }
    .code-timer {
      margin-top: 8px;
      font-size: 13px;
      color: var(--gray2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .code-timer .timer-bar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .code-timer .timer-fill {
      height: 100%;
      background: var(--cyan);
      border-radius: 2px;
      transition: width 1s linear;
    }
    .code-timer .timer-text { font-size: 12px; white-space: nowrap; }

    /* ── Estado de espera ────────────────────────────────────── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dots-wrap {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0.3;
      animation: dotBounce 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1.2); }
    }
    .status-text {
      font-size: 16px;
      color: var(--gray2);
    }

    /* ── Botón fallback (cédula) ─────────────────────────────── */
    .btn-fallback {
      align-self: flex-start;
      margin-top: 1vh;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      color: var(--gray2);
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .btn-fallback:focus,
    .btn-fallback:hover {
      border-color: var(--focus-clr);
      color: var(--focus-clr);
      background: rgba(255,215,0,0.06);
    }

    /* ── Panel fallback cédula/clave ─────────────────────────── */
    .fallback-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .fallback-panel.visible { display: flex; }

    .field-tv { display: flex; flex-direction: column; gap: 8px; }
    .field-tv label {
      font-size: 16px;
      color: var(--gray2);
      font-weight: 600;
    }
    .field-tv input {
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 22px;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      -webkit-appearance: none;
    }
    .field-tv input:focus {
      border-color: var(--focus-clr);
      background: rgba(255,215,0,0.04);
    }

    .btn-tv-login {
      padding: 16px 24px;
      background: var(--cyan);
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-tv-login:focus,
    .btn-tv-login:hover {
      background: #00B8D0;
      outline: 3px solid var(--focus-clr);
      outline-offset: 3px;
    }

    .btn-back-qr {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      color: var(--gray2);
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
    }
    .btn-back-qr:focus, .btn-back-qr:hover {
      border-color: var(--focus-clr);
      color: var(--focus-clr);
    }

    .fallback-error {
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: #FF9999;
      display: none;
    }
    .fallback-error.show { display: block; }

    /* ── Pantalla de éxito ───────────────────────────────────── */
    .success-overlay {
      position: fixed; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      gap: 24px;
      z-index: 100;
    }
    .success-overlay.show { display: flex; }

    .success-check {
      width: 100px; height: 100px;
      background: rgba(76,175,80,0.15);
      border: 3px solid #4CAF50;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-check svg { width: 52px; height: 52px; fill: #4CAF50; }
    .success-title { font-size: 38px; font-weight: 800; }
    .success-sub   { font-size: 20px; color: var(--gray2); }

    /* ── Spinner para botón ──────────────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid var(--navy);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     PANTALLA PRINCIPAL: QR + CÓDIGO
     ══════════════════════════════════════════════════════════ -->
<div class="screen" id="main-screen">

  <!-- Columna izquierda: QR -->
  <div class="col-qr">
    <div class="logo">
      <div class="logo-circle">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="logo-name">LUKI<span>PLAY</span></div>
    </div>

    <div class="qr-box pulsing" id="qr-box">
      <!-- Esquinas decorativas -->
      <div class="qr-corner tl"></div>
      <div class="qr-corner tr"></div>
      <div class="qr-corner bl"></div>
      <div class="qr-corner br"></div>
      <!-- QR image (inyectada por JS) -->
      <img class="qr-img" id="qr-img" src="" alt="Código QR de activación" />
    </div>

    <div class="scan-label">
      <strong>Escanea con tu teléfono</strong><br>
      para iniciar sesión rápidamente
    </div>
  </div>

  <!-- Divisor -->
  <div class="divider"></div>
  <div class="divider-label">O</div>

  <!-- Columna derecha: código + estado -->
  <div class="col-code" id="col-code">

    <!-- Vista QR: instrucciones + código + estado -->
    <div id="view-code">
      <div class="step-label" style="margin-bottom:12px">Desde tu teléfono o PC</div>

      <div class="instructions" style="margin-bottom:16px">
        Abre esta dirección<br>e ingresa el código:
      </div>

      <div class="url-chip" style="margin-bottom:20px">
        <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
        play.luki.tv/activar
      </div>

      <div class="code-container" style="margin-bottom:20px">
        <div class="code-container-label">CÓDIGO DE ACTIVACIÓN</div>
        <div class="code-value loading" id="code-display">— — —</div>
        <div class="code-timer">
          <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
          <div class="timer-text" id="timer-text">5:00</div>
        </div>
      </div>

      <div class="status-row" style="margin-bottom:24px">
        <div class="dots-wrap">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="status-text" id="status-text">Esperando que inicies sesión…</div>
      </div>

      <button class="btn-fallback" id="btn-show-fallback">
        Ingresar con cédula y clave
      </button>
    </div>

    <!-- Vista fallback: cédula + clave -->
    <div class="fallback-panel" id="view-fallback">
      <div class="step-label">Ingreso manual</div>

      <div class="fallback-error" id="fallback-error"></div>

      <div class="field-tv">
        <label for="tv-cedula">Cédula</label>
        <input
          type="text"
          id="tv-cedula"
          placeholder="0000000000"
          maxlength="13"
          inputmode="numeric"
          autocomplete="username"
        />
      </div>

      <div class="field-tv">
        <label for="tv-clave">Clave</label>
        <input
          type="password"
          id="tv-clave"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="btn-tv-login" id="btn-tv-login">
        Iniciar sesión
      </button>

      <button class="btn-back-qr" id="btn-back-qr">
        ← Volver al código QR
      </button>
    </div>

  </div><!-- /col-code -->
</div><!-- /main-screen -->

<!-- ══════════════════════════════════════════════════════════
     PANTALLA DE ÉXITO
     ══════════════════════════════════════════════════════════ -->
<div class="success-overlay" id="success-overlay">
  <div class="success-check">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </div>
  <div class="success-title">¡Bienvenido!</div>
  <div class="success-sub">Sesión iniciada correctamente</div>
</div>

<script>
(function () {
  'use strict';

  // ── Config ────────────────────────────────────────────────────────────────
  const API_BASE      = '';         // mismo origen; o 'https://play.luki.tv'
  const POLL_INTERVAL = 5_000;      // ms entre polls
  const CODE_TTL_S    = 300;        // 5 minutos (debe coincidir con el backend)

  // ── Estado ────────────────────────────────────────────────────────────────
  let deviceCode   = null;
  let pollTimer    = null;
  let countdownTimer = null;
  let expiresAt    = null;

  // ── Helpers DOM ───────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function setLoading(btn, loading, text) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<div class="spinner"></div>'
      : text;
  }

  // ── API helper ────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const res = await fetch(API_BASE + path, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : undefined,
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  }

  // ── Obtener info del dispositivo (bridge nativo) ──────────────────────────
  function getDeviceInfo() {
    try {
      if (window.LukiNative?.getDeviceInfo) {
        return JSON.parse(window.LukiNative.getDeviceInfo());
      }
    } catch (_) {}
    return { isTV: false, deviceId: null, apiBaseUrl: API_BASE };
  }

  // ── Notificar login exitoso al nativo ─────────────────────────────────────
  function notifyLoginSuccess(accessToken, userId, displayName) {
    const payload = JSON.stringify({ accessToken, userId, displayName: displayName || '' });
    try {
      if (window.LukiNative?.onLoginSuccess) {
        window.LukiNative.onLoginSuccess(payload);
        return;
      }
    } catch (_) {}
    // Fallback: postMessage para entornos sin bridge nativo
    window.parent?.postMessage({ type: 'LOGIN_SUCCESS', accessToken, userId }, '*');
  }

  // ── Countdown del código ──────────────────────────────────────────────────
  function startCountdown(ttlSeconds) {
    clearInterval(countdownTimer);
    const endMs = Date.now() + ttlSeconds * 1000;
    expiresAt   = endMs;

    function tick() {
      const remaining = Math.max(0, Math.floor((endMs - Date.now()) / 1000));
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      $('timer-text').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      $('timer-fill').style.width = `${(remaining / ttlSeconds) * 100}%`;

      if (remaining <= 30) {
        $('timer-fill').style.background = '#FFA500';
      }
      if (remaining === 0) {
        clearInterval(countdownTimer);
        $('status-text').textContent = 'Código expirado. Generando uno nuevo…';
        initActivation(); // Auto-renueva
      }
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  // ── Inicializar: pedir código al backend ──────────────────────────────────
  async function initActivation() {
    stopPolling();
    $('code-display').classList.add('loading');
    $('code-display').textContent = '— — —';
    $('qr-img').src = '';
    $('status-text').textContent = 'Obteniendo código…';

    const { ok, data } = await api('POST', '/api/tv/device-code');

    if (!ok || !data.device_code) {
      $('status-text').textContent = 'Error de conexión. Reintentando…';
      setTimeout(initActivation, 5000);
      return;
    }

    deviceCode = data.device_code;

    // Mostrar código
    $('code-display').textContent = data.user_code;
    $('code-display').classList.remove('loading');

    // Mostrar QR
    if (data.qr_data_url) {
      $('qr-img').src = data.qr_data_url;
      $('qr-box').classList.add('pulsing');
    }

    // Countdown
    startCountdown(data.expires_in || CODE_TTL_S);

    // Iniciar polling
    $('status-text').textContent = 'Esperando que inicies sesión…';
    startPolling();
  }

  // ── Polling ───────────────────────────────────────────────────────────────
  function startPolling() {
    stopPolling();
    pollTimer = setInterval(async () => {
      if (!deviceCode) return;

      const { ok, data } = await api('GET', `/api/tv/poll?device_code=${deviceCode}`);
      if (!ok) return;

      if (data.status === 'authorized') {
        stopPolling();
        clearInterval(countdownTimer);
        showSuccess(data.access_token, data.user_id);
      }

      if (data.status === 'expired') {
        stopPolling();
        clearInterval(countdownTimer);
        initActivation();
      }
    }, POLL_INTERVAL);
  }

  function stopPolling() {
    clearInterval(pollTimer);
    pollTimer = null;
  }

  // ── Pantalla de éxito ─────────────────────────────────────────────────────
  function showSuccess(accessToken, userId) {
    $('success-overlay').classList.add('show');
    notifyLoginSuccess(accessToken, userId);
  }

  // ── Vista: cambiar entre QR y cédula ─────────────────────────────────────
  $('btn-show-fallback').addEventListener('click', () => {
    $('view-code').style.display    = 'none';
    $('view-fallback').classList.add('visible');
    setTimeout(() => $('tv-cedula').focus(), 50);
  });

  $('btn-back-qr').addEventListener('click', () => {
    $('view-fallback').classList.remove('visible');
    $('view-code').style.display = '';
    $('fallback-error').classList.remove('show');
    $('fallback-error').textContent = '';
  });

  // ── Login con cédula/clave (fallback TV) ──────────────────────────────────
  $('btn-tv-login').addEventListener('click', async () => {
    const cedula = $('tv-cedula').value.trim();
    const clave  = $('tv-clave').value;

    if (!cedula || !clave) {
      showFallbackError('Ingresa tu cédula y clave.');
      return;
    }

    $('fallback-error').classList.remove('show');
    setLoading($('btn-tv-login'), true, 'Iniciar sesión');

    const deviceInfo = getDeviceInfo();

    const { ok, data } = await api('POST', '/auth/app/id-login', {
      idNumber: cedula,
      password: clave,
      deviceId: deviceInfo.deviceId || `tv-${Date.now()}`,
    });

    setLoading($('btn-tv-login'), false, 'Iniciar sesión');

    if (!ok) {
      showFallbackError(data.message || 'Cédula o clave incorrectos. Intenta de nuevo.');
      return;
    }

    const accessToken = data.accessToken || data.access_token || data.token;
    const userId      = data.userId      || data.user?.id;

    if (!accessToken) {
      showFallbackError('Respuesta inesperada del servidor.');
      return;
    }

    showSuccess(accessToken, userId);
  });

  function showFallbackError(msg) {
    $('fallback-error').textContent = msg;
    $('fallback-error').classList.add('show');
  }

  // ── Navegación D-pad entre campos ─────────────────────────────────────────
  $('tv-cedula').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === 'ArrowDown') $('tv-clave').focus();
  });
  $('tv-clave').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btn-tv-login').click();
    if (e.key === 'ArrowUp') $('tv-cedula').focus();
  });

  // ── Arranque ──────────────────────────────────────────────────────────────
  initActivation();

})();
</script>
</body>
</html>
